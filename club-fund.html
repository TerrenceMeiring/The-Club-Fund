<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Club Fund</title>
<link rel="icon" href="data:,">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap');

:root{
  --bg:#F6F3EA;
  --paper:#FFFEFB;
  --fairway:#28453A;
  --fairway-light:#4D6F5C;
  --sand:#DCCBA0;
  --flag:#BD4430;
  --ink:#26241F;
  --ink-soft:#74705F;
  --line:#D8CFB8;
  --green-pos:#3C6E4D;
}
*{ box-sizing:border-box; }
html,body{ margin:0; min-height:100%; }
body{
  font-family:'Inter', system-ui, sans-serif;
  background:var(--bg);
  color:var(--ink);
}
.cf-app{
  padding:28px 16px 70px;
  min-height:100vh;
}
.cf-wrap{ max-width:720px; margin:0 auto; }

.cf-head{
  display:flex; justify-content:space-between; align-items:flex-end;
  gap:20px; flex-wrap:wrap;
  border-bottom:3px solid var(--fairway);
  padding-bottom:18px; margin-bottom:22px;
}
.cf-eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--flag); margin:0 0 6px;
}
.cf-title{
  font-family:'Fraunces', serif; font-weight:700;
  font-size:38px; margin:0; color:var(--fairway); line-height:1;
}
.cf-balance-block{ text-align:right; }
.cf-balance-label{
  display:block; font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);
}
.cf-balance{
  font-family:'IBM Plex Mono', monospace; font-weight:600;
  font-size:42px; color:var(--fairway); line-height:1.1;
  font-variant-numeric: tabular-nums;
}
.cf-earned{ font-size:12px; color:var(--ink-soft); }

.cf-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px; }
.cf-btn{
  font-family:'Inter', sans-serif; font-weight:600; font-size:14px;
  border:2px solid var(--fairway); background:var(--fairway); color:var(--paper);
  padding:11px 18px; border-radius:3px; cursor:pointer;
  transition:transform .08s ease, opacity .15s ease;
}
.cf-btn:hover{ opacity:.92; }
.cf-btn:active{ transform:scale(.97); }
.cf-btn.cf-ghost{
  background:transparent; color:var(--fairway);
}
.cf-btn.cf-flag{ border-color:var(--flag); background:var(--flag); }
.cf-btn.cf-small{ padding:6px 12px; font-size:12px; }

.cf-card{
  background:var(--paper); border:1px solid var(--line); border-radius:4px;
  padding:18px 20px; margin-bottom:18px;
}
.cf-card h2{
  font-family:'Fraunces', serif; font-size:18px; margin:0 0 12px; color:var(--fairway);
}
.cf-stats-row{ display:flex; gap:24px; flex-wrap:wrap; }
.cf-stat{ min-width:90px; }
.cf-stat-val{ font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; color:var(--fairway); }
.cf-stat-label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; }

.cf-chal{
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  padding:10px 0; border-bottom:1px dashed var(--line);
}
.cf-chal:last-child{ border-bottom:none; }
.cf-chal-tag{
  font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase;
  letter-spacing:.08em; color:var(--flag); display:block; margin-bottom:2px;
}
.cf-chal-text{ font-size:14px; }
.cf-chal-amt{ font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--green-pos); white-space:nowrap; }
.cf-chal-actions{ display:flex; gap:6px; }

.cf-empty{ color:var(--ink-soft); font-size:13px; font-style:italic; }

.cf-ledger-row{
  display:flex; justify-content:space-between; gap:12px;
  padding:9px 0; border-bottom:1px solid var(--line); font-size:14px;
}
.cf-ledger-row:last-child{ border-bottom:none; }
.cf-ledger-main{ display:flex; flex-direction:column; }
.cf-ledger-date{ font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }
.cf-ledger-amt{ font-family:'IBM Plex Mono',monospace; font-weight:600; white-space:nowrap; }
.cf-ledger-amt.pos{ color:var(--green-pos); }
.cf-ledger-amt.neg{ color:var(--flag); }

.cf-modal-backdrop{
  position:fixed; inset:0; background:rgba(38,36,31,.45);
  display:flex; align-items:center; justify-content:center; padding:16px; z-index:50;
}
.cf-modal{
  background:var(--paper); border-radius:6px; padding:24px; max-width:440px; width:100%;
  max-height:86vh; overflow-y:auto;
}
.cf-modal h3{ font-family:'Fraunces',serif; color:var(--fairway); margin:0 0 16px; font-size:20px; }
.cf-field{ margin-bottom:14px; }
.cf-field label{ display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; text-transform:uppercase; letter-spacing:.06em; }
.cf-field input, .cf-field select{
  width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:3px;
  font-family:'Inter',sans-serif; font-size:14px; background:#fff;
}
.cf-field-row{ display:flex; gap:10px; }
.cf-field-row .cf-field{ flex:1; }
.cf-modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }

.cf-milestone-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.cf-milestone-row input{ flex:1; }

.cf-settings-link{ display:block; text-align:center; margin-top:30px; font-size:12px; color:var(--ink-soft); text-decoration:underline; cursor:pointer; }
.cf-hidden{ display:none !important; }
.cf-status{ font-size:12px; color:var(--ink-soft); text-align:center; margin-top:10px; }

@media (max-width: 480px){
  .cf-title{ font-size:30px; }
  .cf-balance{ font-size:32px; }
}
</style>
</head>
<body>
<div class="cf-app">
  <div class="cf-wrap">

    <div class="cf-head">
      <div>
        <p class="cf-eyebrow">Club Fund</p>
        <h1 class="cf-title">Scorecard</h1>
      </div>
      <div class="cf-balance-block">
        <span class="cf-balance-label">Balance</span>
        <div class="cf-balance" id="cfBalance">R0</div>
        <div class="cf-earned" id="cfEarned">R0 earned to date</div>
      </div>
    </div>

    <div class="cf-actions">
      <button class="cf-btn" id="cfLogRoundBtn">Log Round</button>
      <button class="cf-btn cf-ghost" id="cfLogPracticeBtn">Log Practice</button>
      <button class="cf-btn cf-flag" id="cfNewChallengeBtn">+ New Challenge</button>
    </div>

    <div class="cf-card">
      <h2>Active Challenges</h2>
      <div id="cfChallenges"><p class="cf-empty">No active challenges — draw one above.</p></div>
    </div>

    <div class="cf-card">
      <h2>Stats</h2>
      <div class="cf-stats-row">
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatBest">—</div><div class="cf-stat-label">Best score</div></div>
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatAvg">—</div><div class="cf-stat-label">Average score</div></div>
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatRounds">0</div><div class="cf-stat-label">Rounds logged</div></div>
      </div>
    </div>

    <div class="cf-card">
      <h2>Ledger</h2>
      <div id="cfLedger"><p class="cf-empty">Nothing logged yet.</p></div>
    </div>

    <span class="cf-settings-link" id="cfSettingsLink">Local Rules (settings)</span>
    <p class="cf-status" id="cfStatus">Connecting…</p>
  </div>
</div>

<!-- Log Round Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalRound">
  <div class="cf-modal">
    <h3>Log a Round</h3>
    <div class="cf-field">
      <label>Score</label>
      <input type="number" id="cfRoundScore" placeholder="e.g. 88" />
    </div>
    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Cancel</button>
      <button class="cf-btn cf-small" id="cfRoundSave">Save</button>
    </div>
  </div>
</div>

<!-- Log Practice Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalPractice">
  <div class="cf-modal">
    <h3>Log Practice</h3>
    <div class="cf-field">
      <label>Type</label>
      <select id="cfPracticeType">
        <option>Putting</option>
        <option>Short game</option>
        <option>Range / full swing</option>
        <option>Bunker play</option>
        <option>Course practice round</option>
      </select>
    </div>
    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Cancel</button>
      <button class="cf-btn cf-small" id="cfPracticeSave">Save</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalSettings">
  <div class="cf-modal">
    <h3>Local Rules</h3>

    <div class="cf-field-row">
      <div class="cf-field"><label>Round flat (R)</label><input type="number" id="cfSetRoundFlat" /></div>
      <div class="cf-field"><label>Personal best bonus (R)</label><input type="number" id="cfSetBestBonus" /></div>
    </div>
    <div class="cf-field-row">
      <div class="cf-field"><label>Practice flat (R)</label><input type="number" id="cfSetPracticeFlat" /></div>
      <div class="cf-field"><label>Current best score</label><input type="number" id="cfSetBestScore" /></div>
    </div>
    <div class="cf-field-row">
      <div class="cf-field"><label>Challenge min (R)</label><input type="number" id="cfSetChalMin" /></div>
      <div class="cf-field"><label>Challenge max (R)</label><input type="number" id="cfSetChalMax" /></div>
    </div>

    <div class="cf-field">
      <label>Milestones (score → bonus)</label>
      <div id="cfMilestoneList"></div>
      <button class="cf-btn cf-ghost cf-small" id="cfAddMilestone">+ Add milestone</button>
    </div>

    <div class="cf-field">
      <label>Adjust balance manually (e.g. -350 after buying clubs)</label>
      <input type="number" id="cfSetBalanceAdjust" placeholder="amount, +/-" />
      <button class="cf-btn cf-ghost cf-small" id="cfApplyAdjust" style="margin-top:8px;">Apply adjustment</button>
    </div>

    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Close</button>
      <button class="cf-btn cf-small" id="cfSettingsSave">Save Rules</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ===== Fill these in from your Supabase project (Settings → API) =====
const SUPABASE_URL = 'https://dggtwvxlbtsjbgktkxfp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZ3R3dnhsYnRzamJna3RreGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjAzMjYsImV4cCI6MjA5ODE5NjMyNn0.c0VrGlMGwz7v9f26s8zapwYFChiltiDn_-rCqRRLl6Y';
// =======================================================================

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CHALLENGE_BANK = [
  { tag: 'skill', text: 'No three-putts this round' },
  { tag: 'skill', text: 'Hit 3 fairways in a row' },
  { tag: 'skill', text: 'Get up-and-down from a bunker' },
  { tag: 'skill', text: 'Birdie or par the hardest hole on the course' },
  { tag: 'skill', text: 'Par every hole on the front nine' },
  { tag: 'practice', text: '50 putts from inside 3m' },
  { tag: 'practice', text: '30 minutes of short-game practice' },
  { tag: 'practice', text: 'Hit 40 range balls focusing on tempo' },
  { tag: 'practice', text: 'Practice bunker shots — 20 reps' },
  { tag: 'bonus', text: 'Play 9 holes before work/school' },
  { tag: 'bonus', text: 'Play a round with someone new' },
  { tag: 'bonus', text: 'Walk the course instead of using a cart' },
];

let profile = null;
let entries = [];

const $ = (id) => document.getElementById(id);
const fmt = (n) => `R${Number(n || 0).toLocaleString('en-ZA', { maximumFractionDigits: 0 })}`;

function setStatus(msg, isError = false) {
  $('cfStatus').textContent = msg;
  $('cfStatus').style.color = isError ? 'var(--flag)' : 'var(--ink-soft)';
}

async function loadAll() {
  setStatus('Loading…');
  const [{ data: p, error: pErr }, { data: e, error: eErr }] = await Promise.all([
    supabase.from('cf_profile').select('*').eq('id', 1).single(),
    supabase.from('cf_entries').select('*').order('created_at', { ascending: false }).limit(300),
  ]);
  if (pErr || eErr) {
    setStatus('Could not connect to Supabase — check your URL/key in the file.', true);
    console.error(pErr || eErr);
    return;
  }
  profile = p;
  entries = e || [];
  setStatus('Synced');
  renderAll();
}

async function saveProfile(patch) {
  Object.assign(profile, patch);
  const { error } = await supabase.from('cf_profile').update(patch).eq('id', 1);
  if (error) { setStatus('Save failed — check connection.', true); console.error(error); }
}

async function addEntry(type, label, amount, meta = null) {
  const { error } = await supabase.from('cf_entries').insert({ type, label, amount, meta });
  if (error) { setStatus('Could not save entry.', true); console.error(error); return; }
  profile.balance = Number(profile.balance) + amount;
  if (amount > 0) profile.total_earned = Number(profile.total_earned) + amount;
  await saveProfile({ balance: profile.balance, total_earned: profile.total_earned });
  await loadAll();
}

function renderBalance() {
  $('cfBalance').textContent = fmt(profile.balance);
  $('cfEarned').textContent = `${fmt(profile.total_earned)} earned to date`;
}

function renderStats() {
  const rounds = entries.filter(e => e.type === 'round' && e.meta && e.meta.score != null);
  $('cfStatBest').textContent = profile.best_score != null ? profile.best_score : '—';
  $('cfStatRounds').textContent = rounds.length;
  if (rounds.length) {
    const avg = rounds.reduce((s, r) => s + Number(r.meta.score), 0) / rounds.length;
    $('cfStatAvg').textContent = avg.toFixed(1);
  } else {
    $('cfStatAvg').textContent = '—';
  }
}

function renderChallenges() {
  const wrap = $('cfChallenges');
  const active = profile.active_challenges || [];
  if (!active.length) {
    wrap.innerHTML = '<p class="cf-empty">No active challenges — draw one above.</p>';
    return;
  }
  wrap.innerHTML = active.map(c => `
    <div class="cf-chal">
      <div>
        <span class="cf-chal-tag">${c.tag}</span>
        <span class="cf-chal-text">${c.text}</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="cf-chal-amt">+${fmt(c.amount)}</span>
        <div class="cf-chal-actions">
          <button class="cf-btn cf-small" data-complete="${c.id}">Complete</button>
          <button class="cf-btn cf-ghost cf-small" data-skip="${c.id}">Skip</button>
        </div>
      </div>
    </div>
  `).join('');
}

function renderLedger() {
  const wrap = $('cfLedger');
  if (!entries.length) {
    wrap.innerHTML = '<p class="cf-empty">Nothing logged yet.</p>';
    return;
  }
  wrap.innerHTML = entries.slice(0, 50).map(e => {
    const date = new Date(e.created_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
    const cls = e.amount >= 0 ? 'pos' : 'neg';
    const sign = e.amount >= 0 ? '+' : '';
    return `
      <div class="cf-ledger-row">
        <div class="cf-ledger-main">
          <span>${e.label}</span>
          <span class="cf-ledger-date">${date}</span>
        </div>
        <span class="cf-ledger-amt ${cls}">${sign}${fmt(e.amount)}</span>
      </div>
    `;
  }).join('');
}

function renderAll() {
  renderBalance();
  renderStats();
  renderChallenges();
  renderLedger();
}

function openModal(id) { $(id).classList.remove('cf-hidden'); }
function closeModal() { document.querySelectorAll('.cf-modal-backdrop').forEach(m => m.classList.add('cf-hidden')); }

document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeModal));
document.querySelectorAll('.cf-modal-backdrop').forEach(m => m.addEventListener('click', (e) => { if (e.target === m) closeModal(); }));

// Log round
$('cfLogRoundBtn').addEventListener('click', () => { $('cfRoundScore').value = ''; openModal('cfModalRound'); });
$('cfRoundSave').addEventListener('click', async () => {
  const score = parseFloat($('cfRoundScore').value);
  if (isNaN(score)) return;
  let amount = Number(profile.round_flat);
  const notes = [];
  if (profile.best_score == null || score < profile.best_score) {
    amount += Number(profile.best_bonus);
    notes.push('personal best!');
    profile.best_score = score;
  }
  const achieved = profile.milestones_achieved || [];
  const newlyAchieved = [...achieved];
  for (const m of (profile.milestones || [])) {
    if (score <= m.score && !achieved.includes(m.score)) {
      amount += Number(m.bonus);
      notes.push(`broke ${m.score}`);
      newlyAchieved.push(m.score);
    }
  }
  await saveProfile({ best_score: profile.best_score, milestones_achieved: newlyAchieved });
  const label = `Round — shot ${score}${notes.length ? ' (' + notes.join(', ') + ')' : ''}`;
  closeModal();
  await addEntry('round', label, amount, { score });
});

// Log practice
$('cfLogPracticeBtn').addEventListener('click', () => openModal('cfModalPractice'));
$('cfPracticeSave').addEventListener('click', async () => {
  const type = $('cfPracticeType').value;
  closeModal();
  await addEntry('practice', `Practice — ${type}`, Number(profile.practice_flat), { practice_type: type });
});

// Challenges
$('cfNewChallengeBtn').addEventListener('click', async () => {
  const active = profile.active_challenges || [];
  if (active.length >= 3) { setStatus('Max 3 active challenges — complete or skip one first.'); return; }
  const used = new Set(active.map(c => c.text));
  const pool = CHALLENGE_BANK.filter(c => !used.has(c.text));
  const pick = pool[Math.floor(Math.random() * pool.length)] || CHALLENGE_BANK[Math.floor(Math.random() * CHALLENGE_BANK.length)];
  const min = Number(profile.challenge_min), max = Number(profile.challenge_max);
  const amount = Math.round((min + Math.random() * (max - min)) / 5) * 5;
  const challenge = { id: crypto.randomUUID(), tag: pick.tag, text: pick.text, amount };
  await saveProfile({ active_challenges: [...active, challenge] });
  renderChallenges();
});

$('cfChallenges').addEventListener('click', async (e) => {
  const completeId = e.target.getAttribute('data-complete');
  const skipId = e.target.getAttribute('data-skip');
  if (completeId) {
    const c = profile.active_challenges.find(x => x.id === completeId);
    const remaining = profile.active_challenges.filter(x => x.id !== completeId);
    await saveProfile({ active_challenges: remaining });
    await addEntry('challenge', `Challenge — ${c.text}`, Number(c.amount), { tag: c.tag });
  } else if (skipId) {
    const remaining = profile.active_challenges.filter(x => x.id !== skipId);
    await saveProfile({ active_challenges: remaining });
    renderChallenges();
  }
});

// Settings
function renderMilestoneEditor() {
  const list = $('cfMilestoneList');
  list.innerHTML = (profile.milestones || []).map((m, i) => `
    <div class="cf-milestone-row">
      <input type="number" data-mscore value="${m.score}" placeholder="score" />
      <input type="number" data-mbonus value="${m.bonus}" placeholder="bonus R" />
      <button class="cf-btn cf-ghost cf-small" data-mremove="${i}">✕</button>
    </div>
  `).join('');
}

$('cfSettingsLink').addEventListener('click', () => {
  $('cfSetRoundFlat').value = profile.round_flat;
  $('cfSetBestBonus').value = profile.best_bonus;
  $('cfSetPracticeFlat').value = profile.practice_flat;
  $('cfSetBestScore').value = profile.best_score ?? '';
  $('cfSetChalMin').value = profile.challenge_min;
  $('cfSetChalMax').value = profile.challenge_max;
  $('cfSetBalanceAdjust').value = '';
  renderMilestoneEditor();
  openModal('cfModalSettings');
});

$('cfAddMilestone').addEventListener('click', () => {
  profile.milestones = [...(profile.milestones || []), { score: 90, bonus: 50 }];
  renderMilestoneEditor();
});

$('cfMilestoneList').addEventListener('click', (e) => {
  const idx = e.target.getAttribute('data-mremove');
  if (idx !== null) {
    profile.milestones.splice(Number(idx), 1);
    renderMilestoneEditor();
  }
});

$('cfApplyAdjust').addEventListener('click', async () => {
  const val = parseFloat($('cfSetBalanceAdjust').value);
  if (isNaN(val)) return;
  $('cfSetBalanceAdjust').value = '';
  await addEntry('adjustment', val >= 0 ? 'Manual adjustment' : 'Spent on clubs', val);
});

$('cfSettingsSave').addEventListener('click', async () => {
  const rows = document.querySelectorAll('#cfMilestoneList .cf-milestone-row');
  const milestones = [];
  rows.forEach(row => {
    const score = parseFloat(row.querySelector('[data-mscore]').value);
    const bonus = parseFloat(row.querySelector('[data-mbonus]').value);
    if (!isNaN(score) && !isNaN(bonus)) milestones.push({ score, bonus });
  });
  const bestScoreVal = $('cfSetBestScore').value;
  const patch = {
    round_flat: parseFloat($('cfSetRoundFlat').value) || 0,
    best_bonus: parseFloat($('cfSetBestBonus').value) || 0,
    practice_flat: parseFloat($('cfSetPracticeFlat').value) || 0,
    challenge_min: parseFloat($('cfSetChalMin').value) || 0,
    challenge_max: parseFloat($('cfSetChalMax').value) || 0,
    best_score: bestScoreVal === '' ? null : parseFloat(bestScoreVal),
    milestones,
    milestones_achieved: (profile.milestones_achieved || []).filter(sc => milestones.some(m => m.score === sc)),
  };
  await saveProfile(patch);
  closeModal();
  renderAll();
});

loadAll();
</script>
</body>
</html>
