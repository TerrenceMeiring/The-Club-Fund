<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Club Fund</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="cf-app">
  <div class="cf-wrap">

    <div class="cf-head">
      <div>
        <p class="cf-eyebrow">Club Fund</p>
        <h1 class="cf-title">Scorecard</h1>
      </div>
      <div class="cf-balance-block">
        <span class="cf-balance-label">Balance</span>
        <div class="cf-balance" id="cfBalance">R0</div>
        <div class="cf-earned" id="cfEarned">R0 earned to date</div>
      </div>
    </div>

    <div class="cf-actions">
      <button class="cf-btn" id="cfLogRoundBtn">Log Round</button>
      <button class="cf-btn cf-ghost" id="cfLogPracticeBtn">Log Practice</button>
      <button class="cf-btn cf-flag" id="cfNewChallengeBtn">+ New Challenge</button>
    </div>

    <div class="cf-card">
      <h2>Active Challenges</h2>
      <div id="cfChallenges"><p class="cf-empty">No active challenges — draw one above.</p></div>
    </div>

    <div class="cf-card">
      <h2>Stats</h2>
      <div class="cf-stats-row">
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatBest">—</div><div class="cf-stat-label">Best score</div></div>
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatAvg">—</div><div class="cf-stat-label">Average score</div></div>
        <div class="cf-stat"><div class="cf-stat-val" id="cfStatRounds">0</div><div class="cf-stat-label">Rounds logged</div></div>
      </div>
    </div>

    <a class="cf-settings-link" href="ledger.html">View Full Ledger →</a>
    <span class="cf-settings-link" id="cfSettingsLink">Local Rules (settings)</span>
    <p class="cf-status" id="cfStatus">Connecting…</p>
  </div>
</div>

<!-- Log Round Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalRound">
  <div class="cf-modal">
    <h3>Log a Round</h3>
    <div class="cf-field">
      <label>Score</label>
      <input type="number" id="cfRoundScore" placeholder="e.g. 88" />
    </div>
    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Cancel</button>
      <button class="cf-btn cf-small" id="cfRoundSave">Save</button>
    </div>
  </div>
</div>

<!-- Log Practice Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalPractice">
  <div class="cf-modal">
    <h3>Log Practice</h3>
    <div class="cf-field">
      <label>Type</label>
      <select id="cfPracticeType">
        <option>Putting</option>
        <option>Short game</option>
        <option>Range / full swing</option>
        <option>Bunker play</option>
        <option>Workout</option>
        <option>Course practice round</option>
      </select>
    </div>
    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Cancel</button>
      <button class="cf-btn cf-small" id="cfPracticeSave">Save</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="cf-modal-backdrop cf-hidden" id="cfModalSettings">
  <div class="cf-modal">
    <h3>Local Rules</h3>

    <div class="cf-field-row">
      <div class="cf-field"><label>Round flat (R)</label><input type="number" id="cfSetRoundFlat" /></div>
      <div class="cf-field"><label>Personal best bonus (R)</label><input type="number" id="cfSetBestBonus" /></div>
    </div>
    <div class="cf-field-row">
      <div class="cf-field"><label>Practice flat (R)</label><input type="number" id="cfSetPracticeFlat" /></div>
      <div class="cf-field"><label>Current best score</label><input type="number" id="cfSetBestScore" /></div>
    </div>
    <div class="cf-field-row">
      <div class="cf-field"><label>Challenge min (R)</label><input type="number" id="cfSetChalMin" /></div>
      <div class="cf-field"><label>Challenge max (R)</label><input type="number" id="cfSetChalMax" /></div>
    </div>

    <div class="cf-field">
      <label>Milestones (score → bonus)</label>
      <div id="cfMilestoneList"></div>
      <button class="cf-btn cf-ghost cf-small" id="cfAddMilestone">+ Add milestone</button>
    </div>

    <div class="cf-field">
      <label>Adjust balance manually (e.g. -350 after buying clubs)</label>
      <input type="number" id="cfSetBalanceAdjust" placeholder="amount, +/-" />
      <button class="cf-btn cf-ghost cf-small" id="cfApplyAdjust" style="margin-top:8px;">Apply adjustment</button>
    </div>

    <div class="cf-modal-actions">
      <button class="cf-btn cf-ghost cf-small" data-close>Close</button>
      <button class="cf-btn cf-small" id="cfSettingsSave">Save Rules</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
